<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập - Thành viên Cộng đồng</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div style="display: flex; justify-content: center; align-items: center; min-height: 100vh; background: #000000; padding: 20px; box-sizing: border-box;">
        
        <div style="background: #0a0a0a; border: 2px solid #ffb6c1; border-radius: 12px; width: 100%; max-width: 360px; padding: 30px 20px; box-sizing: border-box; box-shadow: 0 0 15px rgba(255,182,193,0.2); text-align: center;">
            
            <h3 style="color: #ffb6c1; margin-top: 0; margin-bottom: 25px; font-size: 18px; text-transform: uppercase; letter-spacing: 0.5px;">
                <i class="fas fa-user-lock"></i> Thành viên cộng đồng
            </h3>

            <div style="display: flex; flex-direction: column; gap: 15px; margin-bottom: 25px; text-align: left;">
                <input type="email" id="loginEmail" placeholder="Nhập Email của bạn..." style="width: 100%; background: #111111; color: #ffffff; border: 1px solid #333333; padding: 12px; border-radius: 6px; outline: none; box-sizing: border-box; font-size: 14px;">
                
                <input type="password" id="loginPassword" placeholder="Nhập mật khẩu..." style="width: 100%; background: #111111; color: #ffffff; border: 1px solid #333333; padding: 12px; border-radius: 6px; outline: none; box-sizing: border-box; font-size: 14px;">
            </div>

            <div style="display: flex; gap: 10px; margin-bottom: 20px;">
                <button id="btnLogin" style="flex: 1; background: #ffb6c1; color: #000000; border: none; padding: 12px; border-radius: 6px; font-weight: bold; cursor: pointer; font-size: 13px;">ĐĂNG NHẬP</button>
                <button id="btnRegister" style="flex: 1; background: #222222; color: #ffffff; border: 1px solid #444444; padding: 12px; border-radius: 6px; font-weight: bold; cursor: pointer; font-size: 13px;">ĐĂNG KÝ MỚI</button>
            </div>

            <a href="index.html" style="color: #777777; font-size: 12px; text-decoration: none; transition: color 0.2s;" onmouseover="this.style.color='#ffb6c1'" onmouseout="this.style.color='#777777'">← Quay lại trang chủ</a>

        </div>

    </div>

    <script type="module" src="login.js"></script>

</body>
</html>
