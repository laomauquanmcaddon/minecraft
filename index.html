<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minecraft Addon & Pack</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="header">
        <div class="avatar-container">
            <img src="anh1.png" alt="Avatar" class="avatar">
        </div>
        <div class="search-container">
            <input type="text" id="search-input" placeholder="Tìm kiếm ở đây...">
        </div>
    </div>

    <h2 class="section-title">NHIỀU LƯỢT TẢI NHẤT</h2>

    <div class="grid-container" id="mod-grid">
        </div>

    <script src="data.js"></script>
    <script>
        // Hàm tự động hiển thị danh sách các mod ra màn hình
        function renderMods(list) {
            const gridContainer = document.getElementById('mod-grid');
            gridContainer.innerHTML = ''; // Làm sạch ô cũ trước khi nạp

            list.forEach(item => {
                const card = document.createElement('div');
                card.className = 'grid-item';

                // QUAN TRỌNG: Đã thêm thuộc tính target="_blank" để tự nhảy sang tab mới khi bấm tải
                card.innerHTML = `
                    <a href="${item.downloadUrl}" target="_blank" class="item-link">
                        <div class="img-box">
                            <img src="${item.img}" alt="${item.name}" onerror="this.src='https://via.placeholder.com/150?text=150x150'">
                        </div>
                        <p class="item-name">${item.name}</p>
                    </a>
                `;
                gridContainer.appendChild(card);
            });
        }

        // Kích hoạt hiển thị danh sách lúc tải trang
        renderMods(modList);

        // Chức năng tìm kiếm tự động khi gõ chữ vào ô tìm kiếm
        document.getElementById('search-input').addEventListener('input', function(e) {
            const keyword = e.target.value.toLowerCase().trim();
            const filteredList = modList.filter(item => 
                item.name.toLowerCase().includes(keyword)
            );
            renderMods(filteredList);
        });
    </script>
</body>
</html>
